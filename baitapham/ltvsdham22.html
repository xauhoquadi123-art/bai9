<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>
    function giaiThua(a) {
        sonhapvao = +prompt(a + "nhập vào đây")
        let luuvao = 1
        for (let i = 1; i <= sonhapvao; i++) {
            luuvao = luuvao * i
        }
        alert("giai thừa của " + sonhapvao + " là: " + luuvao)
    }giaiThua("")
</script>
</body>
</html>
