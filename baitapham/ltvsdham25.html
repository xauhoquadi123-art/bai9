<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>

<body>
<script>
    let nhapvao=+prompt("nhập vào số nguyên");
    function songuyen(so){
        if (so>=1) {
            return true;
        }else if(so<=-1){
            return false;
        }
    }alert(songuyen(nhapvao))
</script>
