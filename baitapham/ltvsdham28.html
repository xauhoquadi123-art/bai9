<script>
 let   nhapvao = prompt("nhập vào bất kì")
  let  kytu = prompt("nhập ký tự muốn xem")

    function kiemtra(mang, kytutim) {
        let dem = 0;
        for (let kytuhientai of mang) {
            if (kytuhientai === kytutim) {
                dem = dem + 1

            }


        }if (dem>0){
        return dem
        }else {
            return -1
        }
    }

    alert(kiemtra(nhapvao,kytu))
</script>
