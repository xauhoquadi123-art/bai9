<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<input id="nhapvao" type="number" style="width: 30px"  >
<button onclick="bamvao()">Chạy</button>
<p id="a"></p>
<script>
    function binhPhuong(nhap) {
        return  nhap*nhap;
    }function bamvao(){
      let bandau=+document.getElementById("nhapvao").value;
       let ketQua = binhPhuong(bandau);
        document.getElementById("a").innerHTML=ketQua;
    }
</script>
</body>
</html>
