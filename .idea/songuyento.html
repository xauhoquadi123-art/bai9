<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>
    let numbers = +prompt("nhập để hiện thị");
    if (isNaN(numbers) || numbers <= 0 || numbers > 20) {
    }else{
    let count = 0;
    let n = 2;
    console.log(`Danh sách ${numbers}số nguyên tố đầu tiên là:`);
    while (count < numbers) {
        let isPrime = true;
        for (let i = 2; i <= Math.sqrt(n); i++) {
            if (n % i === 0) {
                isPrime = false;
                break;
            }
        }
        if (isPrime) {
            document.write(n + "<br>");
            count++;
        }
        n++;
    }
    }
</script>
</body>
</html>
