<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<p id="hienthi"></p>
</body>
<script>
  let ketqua = "";
  for (let i = 1; i < 100; i++) {
      if (i%15===0){
          ketqua += "fizzbuzz <br>";
      }else if (i%5===0){
          ketqua += "buzz <br>";
      }else if (i%3===0){
          ketqua += "fizz <br>";
      }else {
          ketqua += i+"<br>";
      }
  }document.getElementById("hienthi").innerHTML = ketqua;
</script>
</html>
