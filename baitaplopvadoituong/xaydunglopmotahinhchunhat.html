<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<canvas id="myCanvas" width="400" height="300" style="border:1px solid #d3d3d3;"></canvas>
<p id="hienthi"></p>
<script>
    class Rectangle { constructor(chieuDai, chieuRong){
    this.chieuDai = chieuDai;
    this.chieuRong = chieuRong;
    } dienTich(){
        return this.chieuDai * this.chieuRong
    } chuVi (){
        return (this.chieuDai + this.chieuRong)*2;
    }goiDan(){
        let ctx = document.getElementById("myCanvas").getContext("2d");
        ctx.fillRect(10, 10, this.chieuDai, this.chieuRong);
        ctx.strokeRect(10, 10,  this.chieuDai, this.chieuRong);
    }
    }
    let bienMoi = new Rectangle(20, 40)
    bienMoi.goiDan();
    bienMoi.chieuDai=50;
    document.getElementById("hienthi").innerHTML ="Diện tích bằng "+ bienMoi.dienTich()+ "Chu vi bằng "+ bienMoi.chuVi();
    

</script>
</body>
</html>
