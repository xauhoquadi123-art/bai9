<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>
    let dauvao = 'The Quick Brow Fox';
    let ketqua = "";
    for (let i= 0; i<dauvao.length; i++){
        if (dauvao[i]===dauvao[i].toUpperCase()){
           ketqua += dauvao[i].toLowerCase()
        }else {
         ketqua += dauvao[i].toUpperCase()
        }
    }document.write(ketqua);
</script>
</body>
</html>
